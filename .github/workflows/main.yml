name: Model Training CI Pipeline Assignment

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:
  train-and-validate:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Check out repository code
        uses: actions/checkout@v4

      - name: 2. Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: 3. Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 4. Run Tests & Log Pytest Results
        run: |
          mkdir -p test-results
          set +e
          python -m pytest -s tests --junitxml=test-results/pytest.xml
          PYTEST_EXIT_CODE=$?
          set -e
          python log_to_mlflow.py --pytest-exit-code "$PYTEST_EXIT_CODE"
          exit "$PYTEST_EXIT_CODE"

      - name: 5. Run Training & Validation Script
        env:
          INFERENCE_COST_PER_1000: "0.001"
        run: python train.py

      - name: 6. Upload MLflow Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mlflow-run-results
          path: mlruns/
          if-no-files-found: error
